# DitherStudio is a 100% client-side Next.js app built as a static export
# (next.config.ts -> output: 'export'), so Netlify just builds and serves ./out.
# No Prisma, no server runtime, no @netlify/plugin-nextjs needed.
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# DitherStudio is a 100% client-side Next.js app built as a static export
# (next.config.ts -> output: 'export'), so Netlify just builds and serves ./out.
# No Prisma, no server runtime. Skip the auto-installed Next SSR plugin so it
# doesn't try to manage the publish dir / add server redirects for a static site.
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
